<!DOCTYPE html>
<html lang="en">

<head>
    <title>{{title}}</title>
    <meta charSet="utf-8" />
    <link rel="alternate" type="application/rss+xml" href="{{rss_feed_url}}" title="RSS 2.0" />
    <meta name="description" content="{{description}}" />
<meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=5, minimum-scale=1, user-scalable=yes" />
    <style>
        @font-face {
            font-family: "Departure Mono";
            src: url('https://static.llllllllllll.com/andor/fonts/DepartureMono-Regular.woff2') format('woff2'),
                url('https://static.llllllllllll.com/andor/fonts/DepartureMono-Regular.woff') format('woff'),
                url('https://static.llllllllllll.com/andor/fonts/DepartureMono-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Adjusted Courier New Fallback';
            src: local('Courier New');
            size-adjust: 136%;
            ascent-override: 90%;
            descent-override: normal;
            line-gap-override: normal;
        }
    </style>
    <link rel="preload" href="/assets/{{style.scss}}" as="style" />
    <link rel="preload" href="https://static.llllllllllll.com/8f4e/screenshots/1.png" as="image" />
    <link rel="stylesheet" href="/assets/{{style.scss}}" />
    <link rel="canonical" href="{{site_url}}/{{pathname}}" />
    <link rel="icon" href="/assets/{{favicon.ico}}" />
    {% if page_specific_css %}
    <link rel="stylesheet" href="/assets/{{page_specific_css}}">
    {% endif %}
</head>

<body>
    <header class="navbar">
        <nav class="resize" aria-label="Main navigation"><a class="editor" target="_blank" href="https://editor.8f4e.com" aria-label="Open editor in new tab. Note: the editor is not screen reader compatible.">↗ Editor</a> <a
                target="_blank" href="https://github.com/andorthehood/8f4e" aria-label="Open GitHub repository in new tab">★ GitHub</a> <a href="#examples">♪
                Examples</a> <a href="#videos">✧ Videos</a></nav>
    </header>
    <div class="background">
        <main class="container resize">
            {{body}}
        </main>
    </div><!-- .background -->
    <footer class="navbar">
        <nav class="resize" aria-label="Footer navigation"><a class="editor" target="_blank" href="https://editor.8f4e.com" aria-label="Open editor in new tab. Note: the editor is not screen reader compatible.">↗ Editor</a> <a
                target="_blank" href="https://github.com/andorthehood/8f4e" aria-label="Open GitHub repository in new tab">★ GitHub</a> <a href="#examples">♪
                Examples</a> <a href="#videos">✧ Videos</a></nav>
    </footer>
    <script src="/assets/{{script.ts}}" defer></script>
</body>

</html>
